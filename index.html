<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радар билетов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #333333);
        }
    </style>
</head>
<body class="p-5 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6 border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-1">🚀 Настройка радара</h2>
        <p class="text-sm text-gray-500 text-center mb-6">Бот будет проверять маршрут каждый час</p>

        <form id="radarForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Откуда (IATA или город):</label>
                <input type="text" id="origin" required placeholder="Например: MOW" 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase text-gray-800">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Куда (IATA, город, страна):</label>
                <input type="text" id="destination" required placeholder="Например: VN" 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase text-gray-800">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Максимальная цена (руб):</label>
                <input type="number" id="maxPrice" required placeholder="30000" 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800">
            </div>
            <button type="submit" id="submitBtn" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg mt-2">
                🔔 Запустить мониторинг
            </button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Автоматически берем ID юзера из Телеграма
        const userId = tg.initDataUnsafe?.user?.id || 123456789;

        document.getElementById('radarForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Сохранение...';

            const data = {
                telegram_user_id: userId,
                origin: document.getElementById('origin').value.trim().toUpperCase(),
                destination: document.getElementById('destination').value.trim().toUpperCase(),
                max_price: parseInt(document.getElementById('maxPrice').value)
            };

            // ВРЕМЕННАЯ ЗАГЛУШКА. Сюда мы вставим ссылку на вебхук n8n позже!
            const n8nWebhookUrl = 'ЗАМЕНИТЬ_НА_URL_ВЕБХУКА_ИЗ_N8N';

            try {
                const response = await fetch(n8nWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    tg.showAlert('Радар успешно запущен!');
                    tg.close();
                } else {
                    alert('Ошибка при сохранении радара.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = '🔔 Запустить мониторинг';
                }
            } catch (error) {
                alert('Не удалось связаться с сервером бота.');
                submitBtn.disabled = false;
                submitBtn.innerText = '🔔 Запустить мониторинг';
            }
        });
    </script>
</body>
</html>
